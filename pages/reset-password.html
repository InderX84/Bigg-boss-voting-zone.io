<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="split">
  <div id="loader"><div class="loader-icon">&#9733;</div><h1>Bigg Boss</h1><span>VOTING ZONE</span><div class="loader-bar"><div class="loader-bar-fill"></div></div></div>

  <div class="split-container">
    <div class="split-left">
      <div class="logo"><span class="logo-icon">&#9733;</span><h1>Bigg Boss</h1><span class="logo-sub">VOTING ZONE</span></div>
      <p class="detail">Create a strong new password to secure your <strong>Voting Zone</strong> account and get back to voting.</p>
    </div>
    <div class="split-right">
      <form class="login-form" onsubmit="resetPassword(event)">
        <h2 class="form-title">Reset Password</h2>
        <p class="form-sub">Enter and confirm your new password</p>
        <div class="input-group"><label for="newPassword">New Password</label><input type="password" id="newPassword" placeholder="Enter new password" required /></div>
        <div class="input-group"><label for="confirmPassword">Confirm Password</label><input type="password" id="confirmPassword" placeholder="Confirm new password" required /></div>
        <button type="submit" class="btn-primary">Reset Password</button>
        <a class="back-btn" href="../index.html">&#8592; Back to Login</a>
      </form>
    </div>
  </div>

  <script src="../css/app.js"></script>
  <script>
    function resetPassword(e) {
      e.preventDefault();
      const np = document.getElementById('newPassword').value;
      const cp = document.getElementById('confirmPassword').value;
      if (np !== cp) {
        showToast('Passwords do not match.', 'error');
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
      } else {
        showToast('Password reset successful!', 'success');
        setTimeout(() => window.location.href = '../index.html', 1200);
      }
    }
  </script>
</body>
</html>
