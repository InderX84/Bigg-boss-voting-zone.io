<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Contestant</title>
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="split">
  <div id="loader"><div class="loader-icon">&#9733;</div><h1>Bigg Boss</h1><span>VOTING ZONE</span><div class="loader-bar"><div class="loader-bar-fill"></div></div></div>

  <div class="split-container">
    <div class="split-left">
      <div class="logo"><span class="logo-icon">&#9733;</span><h1>Bigg Boss</h1><span class="logo-sub">VOTING ZONE</span></div>
      <p class="detail">Add new contestants to the <strong>Voting Zone</strong>. Upload a photo, enter their details, and they'll be available for public voting.</p>
    </div>
    <div class="split-right">
      <form class="contestant-form" onsubmit="addContestant(event)">
        <h2 class="form-title">Add Contestant</h2>
        <p class="form-sub">Fill in the contestant details below</p>
        <div class="photo-upload" onclick="document.getElementById('fileInput').click()">
          <img id="photo" src="../assets/image.jpg" alt="Contestant Photo" />
          <div class="photo-overlay">&#128247; Change Photo</div>
          <input type="file" id="fileInput" accept="image/*" onchange="previewImage(event)" hidden />
        </div>
        <div class="input-group"><label for="cont-name">Contestant Name</label><input type="text" id="cont-name" placeholder="Enter contestant name" required /></div>
        <div class="input-group"><label for="cont-number">Contestant Number</label><input type="text" id="cont-number" placeholder="Enter contestant number" required /></div>
        <div class="input-group"><label for="message">Details</label><textarea id="message" rows="4" placeholder="Enter contestant bio or details..." required></textarea></div>
        <button type="submit" class="btn-primary">Add Contestant</button>
        <a class="back-btn" href="admin-dashboard.html">&#8592; Back to Dashboard</a>
      </form>
    </div>
  </div>

  <script src="../css/app.js"></script>
  <script>
    function previewImage(e) {
      const file = e.target.files[0];
      if (file) { const r = new FileReader(); r.onload = () => document.getElementById('photo').src = r.result; r.readAsDataURL(file); }
    }
    function addContestant(e) {
      e.preventDefault();
      showToast('Contestant added successfully!', 'success');
      e.target.reset();
      document.getElementById('photo').src = '../assets/image.jpg';
    }
  </script>
</body>
</html>
