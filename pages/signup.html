<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="split">
  <div id="loader"><div class="loader-icon">&#9733;</div><h1>Bigg Boss</h1><span>VOTING ZONE</span><div class="loader-bar"><div class="loader-bar-fill"></div></div></div>

  <div class="split-container">
    <div class="split-left">
      <div class="logo"><span class="logo-icon">&#9733;</span><h1>Bigg Boss</h1><span class="logo-sub">VOTING ZONE</span></div>
      <p class="detail">Join the <strong>Voting Zone</strong> and make your voice heard. Register now to vote for your favourite contestant.</p>
    </div>
    <div class="split-right">
      <form class="signup-form" onsubmit="signup(event)">
        <h2 class="form-title">Create Account</h2>
        <p class="form-sub">Sign up to start voting</p>
        <div class="input-row">
          <div class="input-group"><label for="fname">First Name</label><input type="text" id="fname" placeholder="First name" name="fname" required /></div>
          <div class="input-group"><label for="lname">Last Name</label><input type="text" id="lname" placeholder="Last name" name="lname" required /></div>
        </div>
        <div class="input-group"><label for="email">Email Address</label><input type="text" id="email" placeholder="Enter your email" name="email" required /></div>
        <div class="input-group"><label for="pswrd">Password</label><input type="password" id="pswrd" placeholder="Min. 8 characters" name="pswrd" required pattern=".{8,16}" title="Minimum 8 characters" /></div>
        <button type="submit" class="btn-primary">Sign Up</button>
        <p class="register">Already a member? <a href="../index.html">Login Now!</a></p>
      </form>
    </div>
  </div>

  <script src="../css/app.js"></script>
  <script>
    function signup(e) {
      e.preventDefault();
      const fname = document.getElementsByName('fname')[0].value;
      const lname = document.getElementsByName('lname')[0].value;
      const email = document.getElementsByName('email')[0].value;
      const pwd   = document.getElementsByName('pswrd')[0].value;
      if (fname && lname && email && pwd) {
        let formData = JSON.parse(localStorage.getItem('formData')) || [];
        if (formData.some(d => d.email === email.toLowerCase())) {
          showToast('Email already registered.', 'error'); return;
        }
        formData.push({ email: email.toLowerCase(), pwd: pwd.toLowerCase() });
        localStorage.setItem('formData', JSON.stringify(formData));
        showToast('Sign up successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = '../index.html', 1200);
      } else {
        showToast('Please fill in all fields.', 'error');
      }
    }
  </script>
</body>
</html>
