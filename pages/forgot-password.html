<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="split">
  <div id="loader"><div class="loader-icon">&#9733;</div><h1>Bigg Boss</h1><span>VOTING ZONE</span><div class="loader-bar"><div class="loader-bar-fill"></div></div></div>

  <div class="split-container">
    <div class="split-left">
      <div class="logo"><span class="logo-icon">&#9733;</span><h1>Bigg Boss</h1><span class="logo-sub">VOTING ZONE</span></div>
      <p class="detail">No worries! Enter your registered email and we'll help you recover access to your <strong>Voting Zone</strong> account.</p>
    </div>
    <div class="split-right">
      <form class="login-form" onsubmit="forgot(event)">
        <h2 class="form-title">Forgot Password</h2>
        <p class="form-sub">Enter your registered email address</p>
        <div class="input-group"><label for="email">Email Address</label><input type="text" id="email" name="email" placeholder="Enter your email" required /></div>
        <button type="submit" class="btn-primary">Submit</button>
        <a class="back-btn" href="../index.html">&#8592; Back to Login</a>
      </form>
    </div>
  </div>

  <script src="../css/app.js"></script>
  <script>
    function forgot(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const formData = JSON.parse(localStorage.getItem('formData')) || [];
      if (!formData.some(d => d.email === email.toLowerCase())) {
        showToast('Email not found. Please register first.', 'error'); return;
      }
      showToast('Reset link sent to ' + email, 'success');
      setTimeout(() => window.location.href = 'reset-password.html', 1200);
    }
  </script>
</body>
</html>
