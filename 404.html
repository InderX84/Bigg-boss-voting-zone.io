<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .page-404 {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px 20px;
      background: rgba(0,0,0,0.5);
    }
    .err-code { font-family: 'Bruno Ace', cursive; font-size: 120px; color: #e82a2a; line-height: 1; text-shadow: 0 0 40px rgba(232,42,42,0.5); }
    .err-title { font-size: 28px; font-weight: 700; color: white; margin: 16px 0 10px; }
    .err-sub   { font-size: 15px; color: rgba(255,255,255,0.5); margin-bottom: 36px; }
    .err-actions { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
  <div class="page-404">
    <div class="err-code">404</div>
    <h1 class="err-title">Page Not Found</h1>
    <p class="err-sub">The page you're looking for doesn't exist or has been moved.</p>
    <div class="err-actions">
      <a href="index.html" class="btn-primary" style="width:auto; display:inline-block; padding: 13px 28px;">&#8592; Back to Login</a>
      <a href="pages/voting.html" class="btn-ghost">Go to Voting</a>
    </div>
  </div>
</body>
</html>
